name = "cool-cell-c75e"
main = "cloudflare-worker.js"
compatibility_date = "2024-01-01"

[vars]
ORIGIN_HOSTNAME = "main--allaboutv2--ddttom.aem.live"
MX_OUTPUTS_HOSTNAME = "raw.githubusercontent.com"
MX_OUTPUTS_REPO_PATH = "/Digital-Domain-Technologies-Ltd/MX-outputs/main"
PUSH_INVALIDATION = "enabled"

# Book sales — Stripe price IDs and MailerLite group IDs.
# Three handbook products: PDF download (£25), UK-only print (£35),
# worldwide print (£40). Stripe price IDs are test-mode values; replace
# with live-mode IDs when going live.
STRIPE_HANDBOOK_PDF_PRICE_ID = "price_1TKcy5L6f3HzLE8reW5zq4nD"
STRIPE_HANDBOOK_PHYSICAL_UK_PRICE_ID = "price_1TKcz5L6f3HzLE8r84hAMiqK"
STRIPE_HANDBOOK_PHYSICAL_WORLD_PRICE_ID = "price_1TKczrL6f3HzLE8rKhP2sSUF"
# MX-Reginald Publisher Listing — annual subscription, GBP 240.
STRIPE_PRICE_ID = "price_1TNBoCL6f3HzLE8rcXRpQR63"
# MailerLite group IDs (account: tom.cranstoun@gmail.com,
# Digital Domain Technologies Ltd, Free plan).
# Both physical_uk and physical_world products use the same physical group;
# the worker code branches on productType === 'pdf', everything else routes
# to the physical group. The buyer's shipping country is in the address field
# so the printworks can route accordingly.
MAILERLITE_GROUP_HANDBOOK_PDF = "184247221067187481"
MAILERLITE_GROUP_HANDBOOK_PHYSICAL = "184247454217012721"
MAILERLITE_GROUP_FREE_BOOK = "185654229318239343"
FREE_BOOK_NOTIFY_EMAIL = "tom.cranstoun@gmail.com"

# Resend (primary email provider — transactional purchase emails).
RESEND_FROM = "CogNovaMX <info@cognovamx.com>"

# Secrets (set via `wrangler secret put` — never commit values):
#   RESEND_API_KEY           — Resend API key (primary email provider)
#   STRIPE_SECRET_KEY        — sk_test_... or sk_live_...
#   STRIPE_WEBHOOK_SECRET    — whsec_... from Stripe Dashboard webhook endpoint
#   MAILERLITE_API_KEY       — MailerLite Developer API token (secondary fallback)

# R2 bucket for book PDFs (handbook, protocols, introduction).
[[r2_buckets]]
binding = "BOOKS_R2"
bucket_name = "mx-books"

# D1 database for reginald publishers, tokens, audit log, and book download links.
[[d1_databases]]
binding = "DB"
database_name = "reginald-auth"
database_id = "c705c861-4d8f-454f-b53e-f8fa0c2d214a"

# Analytics Engine — logs COG resolution events from handleMxSubdomain for
# the reginald subdomain. Dataset is auto-created on first write.
# Query via the SQL API using CLOUDFLARE_API_TOKEN (Account Analytics: Read).
[[analytics_engine_datasets]]
binding = "ANALYTICS"
dataset = "reginald-resolutions"

[[routes]]
pattern = "allabout.network/*"
zone_name = "allabout.network"

[[routes]]
pattern = "www.allabout.network/*"
zone_name = "allabout.network"

[[routes]]
pattern = "content.allabout.network/*"
zone_name = "allabout.network"

[[routes]]
pattern = "mx.allabout.network/*"
zone_name = "allabout.network"

# reginald.allabout.network — book sales API + reginald publisher API.
# The deprecated mx-reginald/worker has its route binding commented out
# to prevent conflicts; this worker (cool-cell-c75e) is now the canonical
# handler for all reginald.allabout.network/* traffic.
[[routes]]
pattern = "reginald.allabout.network/*"
zone_name = "allabout.network"

# Scheduled handlers.
#   0 2 * * *  — daily 02:00 UTC: suspend expired subscriptions
#   0 3 1 * *  — monthly 1st 03:00 UTC: publisher aliveness checks
#   5 * * * *  — hourly at :05: GA4 connector for ai_visits forwarding
[triggers]
crons = ["0 2 * * *", "0 3 1 * *", "5 * * * *"]

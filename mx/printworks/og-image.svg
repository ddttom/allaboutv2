<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#16213e"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#c9a961"/>
      <stop offset="100%" stop-color="#e0c080"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Decorative grid lines (subtle print/publishing motif) -->
  <g opacity="0.06" stroke="#ffffff" stroke-width="1">
    <line x1="100" y1="0" x2="100" y2="630"/>
    <line x1="200" y1="0" x2="200" y2="630"/>
    <line x1="1000" y1="0" x2="1000" y2="630"/>
    <line x1="1100" y1="0" x2="1100" y2="630"/>
    <line x1="0" y1="100" x2="1200" y2="100"/>
    <line x1="0" y1="530" x2="1200" y2="530"/>
  </g>

  <!-- Gold accent bar -->
  <rect x="100" y="160" width="6" height="200" fill="url(#accent)" rx="3"/>

  <!-- MX Printworks title -->
  <text x="140" y="230" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="72" font-weight="700" fill="#ffffff" letter-spacing="-1">MX Printworks</text>

  <!-- Tagline -->
  <text x="140" y="290" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="32" fill="#c9a961" letter-spacing="0.5">Publishing for the AI Age</text>

  <!-- Description -->
  <text x="140" y="350" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="22" fill="#8899aa">Not just printing — producing systems of knowledge.</text>

  <!-- Book icon motif (stylised open book) -->
  <g transform="translate(920, 180)" opacity="0.15">
    <path d="M0,120 L0,0 Q60,-20 120,0 L120,120 Q60,100 0,120Z" fill="#ffffff"/>
    <path d="M120,0 Q180,-20 240,0 L240,120 Q180,100 120,120Z" fill="#ffffff"/>
    <line x1="120" y1="0" x2="120" y2="120" stroke="#1a1a2e" stroke-width="2"/>
  </g>

  <!-- CogNovaMX branding -->
  <text x="140" y="520" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="18" fill="#556677" letter-spacing="2">COGNOVAMX LTD</text>

  <!-- URL -->
  <text x="140" y="550" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="16" fill="#445566">allabout.network/mx/printworks</text>

  <!-- Bottom accent line -->
  <rect x="0" y="620" width="1200" height="10" fill="url(#accent)"/>
</svg>

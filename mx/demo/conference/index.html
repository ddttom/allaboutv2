<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MX Summit 2026 - Redirecting...</title>
  <meta name="robots" content="noindex">

  <!-- MX carrier metadata -->
  <meta name="mx:status" content="active">
  <meta name="mx:contentType" content="demo">

  <!-- hreflang for crawlers -->
  <link rel="alternate" hreflang="en" href="https://allabout.network/mx/demo/conference/en/index.html" />
  <link rel="alternate" hreflang="de" href="https://allabout.network/mx/demo/conference/de/index.html" />
  <link rel="alternate" hreflang="x-default" href="https://allabout.network/mx/demo/conference/en/index.html" />

  <link rel="stylesheet" href="conference.css">

  <script>
    /**
     * N-Language Root Redirect
     * Detects browser language and redirects to appropriate version.
     * GDPR compliant: no cookies, no localStorage, always follows Accept-Language.
     */
    (function() {
      const availableLanguages = ['en', 'de'];
      const defaultLanguage = 'en';

      // Parse Accept-Language style preferences
      function parseLanguagePreferences() {
        const languages = navigator.languages || [navigator.language || navigator.userLanguage];
        return languages.map(lang => {
          const parts = lang.toLowerCase().split('-');
          return {
            full: lang.toLowerCase(),
            base: parts[0],
            region: parts[1] || null
          };
        });
      }

      // Find best matching language with regional cascade
      function findBestLanguage(browserLangs, available, defaultLang) {
        for (const pref of browserLangs) {
          // Try exact match first (de-DE)
          if (available.includes(pref.full)) return pref.full;
          // Then base language (de)
          if (available.includes(pref.base)) return pref.base;
        }
        return defaultLang;
      }

      const browserPrefs = parseLanguagePreferences();
      const targetLang = findBestLanguage(browserPrefs, availableLanguages, defaultLanguage);

      // Redirect to language-specific version
      window.location.replace('./' + targetLang + '/');
    })();
  </script>
</head>
<body>
  <div class="container">
    <h1>MX Summit 2026</h1>
    <p>Detecting your language preference...</p>

    <noscript>
      <p>JavaScript is required for automatic language detection.</p>
      <div class="links">
        <a href="./en/">English</a>
        <a href="./de/">Deutsch</a>
      </div>
    </noscript>
  </div>
</body>
</html>

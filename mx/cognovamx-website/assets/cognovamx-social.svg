<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a365d"/>
      <stop offset="100%" style="stop-color:#2d4a7a"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#66a3ff"/>
      <stop offset="100%" style="stop-color:#99c2ff"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Subtle grid pattern -->
  <g opacity="0.04" stroke="#ffffff" stroke-width="1">
    <line x1="0" y1="105" x2="1200" y2="105"/>
    <line x1="0" y1="210" x2="1200" y2="210"/>
    <line x1="0" y1="315" x2="1200" y2="315"/>
    <line x1="0" y1="420" x2="1200" y2="420"/>
    <line x1="0" y1="525" x2="1200" y2="525"/>
    <line x1="200" y1="0" x2="200" y2="630"/>
    <line x1="400" y1="0" x2="400" y2="630"/>
    <line x1="600" y1="0" x2="600" y2="630"/>
    <line x1="800" y1="0" x2="800" y2="630"/>
    <line x1="1000" y1="0" x2="1000" y2="630"/>
  </g>

  <!-- Accent bar at top -->
  <rect x="0" y="0" width="1200" height="5" fill="url(#accent)"/>

  <!-- Decorative corner elements -->
  <g opacity="0.08" fill="none" stroke="#ffffff" stroke-width="2">
    <!-- Top-left bracket -->
    <polyline points="80,60 60,60 60,100"/>
    <!-- Top-right bracket -->
    <polyline points="1120,60 1140,60 1140,100"/>
    <!-- Bottom-left bracket -->
    <polyline points="60,530 60,570 80,570"/>
    <!-- Bottom-right bracket -->
    <polyline points="1140,530 1140,570 1120,570"/>
  </g>

  <!-- MX wordmark -->
  <text x="600" y="180" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="28" font-weight="600" fill="#66a3ff" text-anchor="middle" letter-spacing="6">MX</text>

  <!-- Company name -->
  <text x="600" y="260" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="64" font-weight="700" fill="#ffffff" text-anchor="middle">CogNovaMX</text>

  <!-- Divider line -->
  <rect x="500" y="290" width="200" height="2" fill="url(#accent)" rx="1"/>

  <!-- Tagline -->
  <text x="600" y="345" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="24" font-weight="400" fill="#c0d0e8" text-anchor="middle">Machine Experience</text>

  <!-- Subtitle -->
  <text x="600" y="400" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="18" font-weight="400" fill="#8fa8c8" text-anchor="middle">Making the web work for everyone</text>
  <text x="600" y="430" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="18" font-weight="400" fill="#8fa8c8" text-anchor="middle">and everything that uses it</text>

  <!-- Three pillar icons (abstract) -->
  <g transform="translate(370, 480)" opacity="0.5">
    <!-- Structured Data icon -->
    <rect x="0" y="0" width="24" height="24" rx="3" fill="none" stroke="#66a3ff" stroke-width="1.5"/>
    <line x1="0" y1="8" x2="24" y2="8" stroke="#66a3ff" stroke-width="1"/>
    <line x1="0" y1="16" x2="24" y2="16" stroke="#66a3ff" stroke-width="1"/>
    <line x1="8" y1="0" x2="8" y2="24" stroke="#66a3ff" stroke-width="1"/>
    <text x="12" y="55" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="10" fill="#8fa8c8" text-anchor="middle">Structure</text>
  </g>

  <g transform="translate(588, 480)" opacity="0.5">
    <!-- Accessibility icon -->
    <circle cx="12" cy="5" r="4" fill="none" stroke="#66a3ff" stroke-width="1.5"/>
    <line x1="12" y1="9" x2="12" y2="18" stroke="#66a3ff" stroke-width="1.5"/>
    <line x1="4" y1="13" x2="20" y2="13" stroke="#66a3ff" stroke-width="1.5"/>
    <line x1="12" y1="18" x2="6" y2="26" stroke="#66a3ff" stroke-width="1.5"/>
    <line x1="12" y1="18" x2="18" y2="26" stroke="#66a3ff" stroke-width="1.5"/>
    <text x="12" y="55" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="10" fill="#8fa8c8" text-anchor="middle">Access</text>
  </g>

  <g transform="translate(806, 480)" opacity="0.5">
    <!-- Explicit intent icon -->
    <rect x="2" y="2" width="20" height="20" rx="2" fill="none" stroke="#66a3ff" stroke-width="1.5"/>
    <polyline points="7,12 10,16 17,8" fill="none" stroke="#66a3ff" stroke-width="2"/>
    <text x="12" y="55" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="10" fill="#8fa8c8" text-anchor="middle">Explicit</text>
  </g>

  <!-- URL -->
  <text x="600" y="600" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="14" font-weight="400" fill="#5a7a9a" text-anchor="middle">allabout.network</text>
</svg>

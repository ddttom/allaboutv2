<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover"
    />
    <meta name="Description" content="AEM Sidekick Library" />
    <meta name="robots" content="noindex" />

    <!-- MX carrier metadata -->
    <meta name="mx:status" content="active">
    <meta name="mx:contentType" content="document">
    <meta name="mx:tags" content="utility">
    <base href="/" />

    <link rel="stylesheet" href="sidekick.css">
    <title>Sidekick Library</title>
  </head>

  <body>
    <script
      type="module"
      src="https://www.aem.live/tools/sidekick/library/index.js"
    ></script>
    <script>
      const library = document.createElement('sidekick-library');
      library.config = {
        base: '/tools/sidekick/library.json',
      };

      document.body.prepend(library);
    </script>
  </body>
</html>

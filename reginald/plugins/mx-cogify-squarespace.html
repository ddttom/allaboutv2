<!-- MX Cogify for Squarespace -->
<!-- Paste this into: Settings > Advanced > Code Injection > Header -->
<script>
(function() {
  'use strict';

  function getMeta(name) {
    var el = document.querySelector('meta[name="' + name + '"], meta[property="' + name + '"]');
    return el ? el.content : '';
  }

  function setMeta(name, content) {
    if (!content) return;
    var el = document.querySelector('meta[name="' + name + '"]');
    if (el) { el.content = content; return; }
    el = document.createElement('meta');
    el.name = name;
    el.content = content;
    document.head.appendChild(el);
  }

  function detectContentType() {
    // Check existing mx:contentType.
    var existing = getMeta('mx:contentType');
    if (existing) return existing;

    // Squarespace body classes.
    var body = document.body.className || '';
    if (/collection-type-blog/i.test(body)) return 'blog-post';
    if (/collection-type-products/i.test(body)) return 'product';
    if (/collection-type-events/i.test(body)) return 'event';
    if (/collection-type-gallery/i.test(body)) return 'gallery';

    // URL patterns.
    var path = window.location.pathname;
    if (/^\/(blog|posts|news)\//i.test(path)) return 'blog-post';
    if (/^\/(products?|shop|store)\//i.test(path)) return 'product';
    if (/^\/(events?)\//i.test(path)) return 'event';
    if (/^\/(about|contact|team|privacy|terms)\b/i.test(path)) return 'page';

    return 'page';
  }

  function cogify() {
    var contentType = detectContentType();

    // MX carrier tags (defaults if not already set).
    if (!getMeta('mx:status')) setMeta('mx:status', 'active');
    if (!getMeta('mx:content-policy')) setMeta('mx:content-policy', 'extract-with-attribution');
    if (!getMeta('mx:audience')) setMeta('mx:audience', 'humans');
    setMeta('mx:contentType', contentType);

    // Tags from existing metadata.
    if (!getMeta('mx:tags')) {
      var keywords = getMeta('keywords');
      if (!keywords) {
        var tags = [];
        document.querySelectorAll('meta[property="article:tag"]').forEach(function(el) {
          tags.push(el.content);
        });
        keywords = tags.join(', ');
      }
      if (keywords) setMeta('mx:tags', keywords);
    }

    // llms.txt discovery link.
    if (!document.querySelector('link[rel="llms-txt"]')) {
      var link = document.createElement('link');
      link.rel = 'llms-txt';
      link.href = '/llms-txt';
      document.head.appendChild(link);
    }

    // Schema.org JSON-LD — only if Squarespace hasn't already generated one.
    if (document.querySelector('script[type="application/ld+json"]')) return;

    var typeMap = {
      'blog-post': 'BlogPosting',
      'article': 'TechArticle',
      'product': 'Product',
      'event': 'Event',
      'gallery': 'WebPage',
      'guide': 'HowTo',
      'report': 'Report'
    };

    var schema = {
      '@context': 'https://schema.org',
      '@type': typeMap[contentType] || 'WebPage',
      'headline': document.title.split(' — ')[0] || document.title,
      'description': getMeta('description') || getMeta('og:description'),
      'url': window.location.href,
      'inLanguage': document.documentElement.lang || 'en',
      'dateModified': getMeta('article:modified_time') || new Date().toISOString().split('T')[0]
    };

    var author = getMeta('author');
    if (author) schema.author = { '@type': 'Person', 'name': author };

    var siteName = getMeta('og:site_name');
    if (siteName) schema.publisher = { '@type': 'Organization', 'name': siteName };

    var image = getMeta('og:image');
    if (image) schema.image = image;

    var datePublished = getMeta('article:published_time');
    if (datePublished) schema.datePublished = datePublished;

    var el = document.createElement('script');
    el.type = 'application/ld+json';
    el.textContent = JSON.stringify(schema);
    document.head.appendChild(el);
  }

  // Wait for Squarespace to finish rendering.
  if ('requestIdleCallback' in window) {
    window.requestIdleCallback(cogify);
  } else {
    window.setTimeout(cogify, 1000);
  }
})();
</script>
